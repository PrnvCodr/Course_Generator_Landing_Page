<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Text To Learn</title>
    <meta name="description" content="Get in touch with the Text To Learn team.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #0B0B0A;
            color: #E8E4DF;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Video Background ── */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.45;
            filter: brightness(0.4) saturate(1.3);
            pointer-events: none;
        }

        .video-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(11, 11, 10, 0.5) 0%, rgba(11, 11, 10, 0.88) 100%),
                linear-gradient(180deg, rgba(11, 11, 10, 0.35) 0%, rgba(11, 11, 10, 0.82) 100%);
            pointer-events: none;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            opacity: 0.022;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .ambient-glow {
            position: fixed;
            top: -160px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse at center, rgba(226, 88, 20, 0.14) 0%, rgba(255, 87, 20, 0.07) 35%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(70px);
        }

        /* ── Glass Nav ── */
        .glass-nav {
            background: rgba(15, 15, 14, 0.72);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset, 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(226, 88, 20, 0.07);
        }

        .nav-link {
            color: #827E77;
            transition: color 0.2s ease;
            text-decoration: none;
            border-radius: 9999px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #C4B8A8;
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.07);
            color: #E8E4DF;
            border: 1px solid rgba(255, 255, 255, 0.09);
        }

        /* ── Main Layout ── */
        .page-wrapper {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .contact-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        /* ── macOS-style Window Card ── */
        .window-card {
            width: 100%;
            max-width: 780px;
            background: rgba(13, 13, 12, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            box-shadow:
                0 0 0 1px rgba(226, 88, 20, 0.1),
                0 40px 100px rgba(0, 0, 0, 0.7),
                0 0 80px rgba(226, 88, 20, 0.05);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            overflow: hidden;
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        /* ── Title Bar ── */
        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.025);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tl {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: filter 0.2s ease;
        }

        .tl-close {
            background: #E25814;
            box-shadow: 0 0 6px rgba(226, 88, 20, 0.5);
        }

        .tl-min {
            background: #C4FF00;
            box-shadow: 0 0 6px rgba(196, 255, 0, 0.4);
        }

        .tl-max {
            background: #8A3E16;
        }

        .title-bar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #4A4540;
        }

        .title-bar-dots {
            display: flex;
            gap: 4px;
        }

        .title-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #3A3530;
        }

        /* ── Body: Two Columns ── */
        .window-body {
            display: flex;
            min-height: 420px;
        }

        /* ── Left Panel ── */
        .left-panel {
            width: 220px;
            flex-shrink: 0;
            padding: 44px 36px;
            display: flex;
            flex-direction: column;
            background: rgba(226, 88, 20, 0.04);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: -80px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(226, 88, 20, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .contact-title {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 1;
        }

        .contact-title .word1 {
            background: linear-gradient(90deg, #FF5714 0%, #E25814 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        .contact-title .word2 {
            color: #E8E4DF;
            display: block;
            margin-top: 2px;
        }

        .title-accent {
            width: 28px;
            height: 3px;
            background: linear-gradient(90deg, #FF5714, #C4FF00);
            border-radius: 2px;
            margin-top: 14px;
        }

        .left-info {
            margin-top: auto;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #4A4540;
            line-height: 1.8;
        }

        .left-info a {
            color: #827E77;
            text-decoration: none;
            transition: color 0.2s ease;
            display: block;
        }

        .left-info a:hover {
            color: #E25814;
        }

        /* ── Right Panel (Form) ── */
        .right-panel {
            flex: 1;
            padding: 44px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #4A4540;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #C4B8A8;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 10px 0;
            outline: none;
            transition: border-color 0.25s ease, color 0.25s ease;
            letter-spacing: 0.02em;
        }

        .form-control::placeholder {
            color: #3A3530;
        }

        .form-control:focus {
            border-bottom-color: #E25814;
            color: #E8E4DF;
        }

        .form-control.message-field {
            margin-top: 10px;
        }

        .form-buttons {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 36px;
        }

        .btn-cancel {
            background: none;
            border: none;
            color: #4A4540;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .btn-cancel:hover {
            color: #827E77;
        }

        .btn-send {
            background: linear-gradient(135deg, #E25814 0%, #8A3E16 100%);
            border: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 11px 28px;
            border-radius: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(226, 88, 20, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-send::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #FF5714 0%, #A04820 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .btn-send:hover::before {
            opacity: 1;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(226, 88, 20, 0.45);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .btn-send span {
            position: relative;
            z-index: 1;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1A140E;
            border: 1px solid rgba(226, 88, 20, 0.3);
            color: #E8E4DF;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
            z-index: 100000;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(226, 88, 20, 0.12);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.error {
            border-color: rgba(226, 40, 20, 0.4);
            background: #1A0E0E;
        }

        /* ── Footer ── */
        .glass-footer {
            background: rgba(15, 15, 14, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.35);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .window-body {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                padding: 32px 28px 24px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .right-panel {
                padding: 32px 28px 40px;
            }

            .title-bar-center {
                display: none;
            }
        }
    </style>
</head>

<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="bg_video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="noise-overlay"></div>
    <div class="ambient-glow"></div>
    <div id="toast"></div>

    <div class="page-wrapper">

        <!-- ═══ NAV ═══ -->
        <header style="padding: 20px 16px 0; flex-shrink:0;">
            <nav class="glass-nav animate-fade-in"
                style="max-width:896px; margin:0 auto; border-radius:9999px; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
                <!-- Logo -->
                <a href="index.html"
                    style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;">
                    <div
                        style="width:32px;height:32px;border-radius:50%;background:#FF5714;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,87,20,0.3);">
                        <div style="width:12px;height:12px;border-radius:50%;background:#0B0B0A;opacity:0.3;"></div>
                    </div>
                    <span
                        style="color:#fff;font-weight:700;letter-spacing:0.08em;font-size:13px;text-transform:uppercase;">Text
                        To Learn</span>
                </a>

                <!-- Links -->
                <div style="display:flex;align-items:center;gap:2px;">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="https://github.com/PrnvCodr/Course_Generator" class="nav-link" target="_blank">Docs</a>
                    <a href="contact.html" class="nav-link active">Contact</a>
                </div>

                <!-- Badges -->
                <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                    <span
                        style="background:rgba(226,88,20,0.1);border:1px solid rgba(226,88,20,0.28);color:#E25814;padding:4px 10px;border-radius:9999px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">AI-Powered</span>
                    <span
                        style="background:rgba(139,160,100,0.08);border:1px solid rgba(139,160,100,0.28);color:#8BA064;padding:4px 10px;border-radius:9999px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">Free</span>
                </div>
            </nav>
        </header>

        <!-- ═══ MAIN ═══ -->
        <main class="contact-main">
            <div class="window-card">

                <!-- Title Bar -->
                <div class="title-bar">
                    <div class="traffic-lights">
                        <div class="tl tl-close" title="Close" onclick="window.location='index.html'"></div>
                        <div class="tl tl-min"></div>
                        <div class="tl tl-max"></div>
                    </div>
                    <div class="title-bar-center">contact.html</div>
                    <div class="title-bar-dots">
                        <div class="title-dot"></div>
                        <div class="title-dot"></div>
                        <div class="title-dot"></div>
                    </div>
                </div>

                <!-- Body -->
                <div class="window-body">

                    <!-- Left Panel -->
                    <div class="left-panel">
                        <div class="contact-title">
                            <span class="word1">CONTACT</span>
                            <span class="word2">US</span>
                        </div>
                        <div class="title-accent"></div>

                        <div class="left-info" style="margin-top: auto;">
                            <div style="margin-bottom:12px;">
                                <div style="color:#3A3530;font-size:9px;margin-bottom:4px;">OWNER</div>
                                <div style="color:white;font-size:10px">Pranav Kashyap</div>
                            </div>
                            <div>
                                <div style="color:#3A3530;font-size:9px;margin-bottom:4px;">GITHUB</div>
                                <a href="https://github.com/PrnvCodr" target="_blank" rel="noopener">github.com/PrnvCodr
                                    ↗</a>
                            </div>
                        </div>
                    </div>

                    <!-- Right Panel -->
                    <div class="right-panel">
                        <form id="contact-form" novalidate>
                            <div class="form-field">
                                <label for="f-name">Name</label>
                                <input class="form-control" type="text" id="f-name" placeholder="YOUR NAME"
                                    autocomplete="name" required>
                            </div>
                            <div class="form-field">
                                <label for="f-email">Email</label>
                                <input class="form-control" type="email" id="f-email" placeholder="YOUR EMAIL"
                                    autocomplete="email" required>
                            </div>
                            <div class="form-field">
                                <label for="f-subject">Subject</label>
                                <input class="form-control" type="text" id="f-subject" placeholder="SUBJECT">
                            </div>
                            <div class="form-field">
                                <label for="f-message">Message</label>
                                <textarea class="form-control message-field" id="f-message" rows="3"
                                    placeholder="YOUR MESSAGE..." required style="resize:none;"></textarea>
                            </div>
                            <div class="form-buttons">
                                <button type="button" class="btn-cancel"
                                    onclick="document.getElementById('contact-form').reset()">CANCEL</button>
                                <button type="submit" class="btn-send" id="send-btn"><span>SEND ✦</span></button>
                            </div>
                        </form>
                    </div>

                </div><!-- /window-body -->
            </div>
        </main>

        <!-- ═══ FOOTER ═══ -->
        <footer style="padding: 0 16px 20px; flex-shrink:0;" class="animate-fade-in delay-200">
            <div class="glass-footer"
                style="max-width:896px;margin:0 auto;border-radius:16px;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div
                        style="width:28px;height:28px;border-radius:50%;background:#FF5714;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <div style="width:10px;height:10px;border-radius:50%;background:#0B0B0A;opacity:0.3;"></div>
                    </div>
                    <div>
                        <span
                            style="color:#fff;font-weight:700;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;display:block;">TEXT
                            TO LEARN</span>
                        <span style="color:#827E77;font-size:11px;">Stop guessing where to study. Make your own course
                            and get started.</span>
                    </div>
                </div>
                <span
                    style="color:#827E77;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;">Copyright
                    2026</span>
            </div>
        </footer>

    </div><!-- /page-wrapper -->

    <script>
        /* ─── Toast ─── */
        function showToast(msg, type = 'default') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'show' + (type === 'error' ? ' error' : '');
            clearTimeout(t._t);
            t._t = setTimeout(() => { t.className = ''; }, 3200);
        }

        /* ─── Traffic light close ─── */
        document.querySelector('.tl-close').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        /* ─── Form Submit ─── */
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('f-name').value.trim();
            const email = document.getElementById('f-email').value.trim();
            const subject = document.getElementById('f-subject').value.trim();
            const message = document.getElementById('f-message').value.trim();
            const btn = document.getElementById('send-btn');

            if (!name || !email || !message) {
                showToast('⚠️  Please fill in all required fields.', 'error'); return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('⚠️  Please enter a valid email.', 'error'); return;
            }

            btn.querySelector('span').textContent = 'SENDING…';
            btn.disabled = true;

            try {
                const res = await fetch('https://formspree.io/f/xzdwaojk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ name, email, subject, message })
                });
                if (res.ok) {
                    showToast('✅  Message sent! I\'ll get back to you soon.');
                    document.getElementById('contact-form').reset();
                } else { throw new Error(); }
            } catch {
                const s = encodeURIComponent(subject || `Message from ${name}`);
                const b = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
                window.open(`mailto:pranavkashyap.official@gmail.com?subject=${s}&body=${b}`);
                showToast('📧  Opened email client as fallback.');
            } finally {
                btn.querySelector('span').textContent = 'SEND ✦';
                btn.disabled = false;
            }
        });

        /* ─── Parallax glow ─── */
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 18;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            const g = document.querySelector('.ambient-glow');
            if (g) g.style.transform = `translateX(calc(-50% + ${x * 0.5}px)) translateY(${y * 0.3}px)`;
        });
    </script>
</body>

</html>
